<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 1: Procedural Face</title>
    <script src="web/socket.io.js"></script>
    <style>
        body {
            margin: 0; padding: 0; background-color: #050505; color: #00ff41;
            font-family: 'Courier New', Courier, monospace; display: flex;
            flex-direction: column; align-items: center; height: 100vh; overflow: hidden;
        }
        #canvas-container { flex: 1; display: flex; justify-content: center; align-items: center; width: 100%; position: relative; }
        canvas { background-color: transparent; filter: drop-shadow(0 0 10px rgba(0, 255, 65, 0.3)); z-index: 10; }
        #hidden-video, #hidden-canvas { display: none; }
        
        .title-bar { position: absolute; top: 20px; left: 20px; font-size: 12px; opacity: 0.7; z-index: 20;}
        
        /* --- NEW: FULLSCREEN TOGGLE BUTTON --- */
        #fullscreen-btn {
            position: absolute; top: 20px; right: 20px;
            background: transparent; color: #00ff41; border: 1px solid #00ff41;
            font-family: 'Courier New', Courier, monospace; font-size: 12px;
            padding: 5px 10px; cursor: pointer; z-index: 50; opacity: 0.7; transition: all 0.3s;
        }
        #fullscreen-btn:hover { background: #00ff41; color: #050505; opacity: 1; }

        /* --- THE AWAKENING OVERLAY --- */
        #start-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(5, 5, 5, 0.95); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #start-btn {
            background-color: transparent; color: #00ff41; border: 2px solid #00ff41;
            padding: 20px 40px; font-size: 24px; font-family: 'Courier New', Courier, monospace;
            cursor: pointer; transition: all 0.3s;
        }
        #start-btn:hover { background-color: #00ff41; color: #050505; }
    </style>
</head>
<body>

    <!-- THE LOCK SCREEN -->
    <div id="start-overlay">
        <p>UNIT_1 (CORELY) // HEAD SUBSYSTEM</p>
        <button id="start-btn">INITIALIZE SENSORY LINK</button>
        <p style="font-size: 12px; opacity: 0.5; margin-top: 20px;">(Please rotate phone sideways if auto-lock fails)</p>
    </div>

    <div class="title-bar" id="status-bar">
        UNIT_1 (CORELY) // HEAD_SUBSYSTEM<br>STATUS: AWAITING_BRAIN_CONNECTION
    </div>

    <!-- NEW: Fullscreen Toggle -->
    <button id="fullscreen-btn">[ FULLSCREEN ]</button>

    <video id="hidden-video" autoplay playsinline muted></video>
    <canvas id="hidden-canvas"></canvas>

    <div id="canvas-container">
        <canvas id="faceCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('faceCanvas');
        const ctx = canvas.getContext('2d');
        const statusBar = document.getElementById('status-bar');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        
        let isBlinking = false; let blinkTimer = 0; let nextBlinkTime = 0;
        let liveValence = 0.0; let liveEnergy = 0.0; let liveTalk = 0.0;
        
        // Audio Context
        let audioCtx;

        const socket = io(); 
        socket.on('connect', () => { statusBar.innerHTML = 'UNIT_1 (CORELY) // HEAD_SUBSYSTEM<br>STATUS: <span style="color: #fff">CONNECTED_TO_BRAIN</span>'; });
        socket.on('disconnect', () => { statusBar.innerHTML = 'UNIT_1 (CORELY) // HEAD_SUBSYSTEM<br>STATUS: <span style="color: #ff0000">DISCONNECTED</span>'; });

        socket.on('emotion_update', (data) => {
            if (data.valence !== undefined) liveValence = data.valence;
            if (data.energy !== undefined) liveEnergy = data.energy;
            if (data.talk !== undefined) liveTalk = data.talk; 
        });

        // --- PHASE 3C: THE VOCAL CORDS ---
        socket.on('vocal_audio', (data) => {
            if (!audioCtx) return;
            const float32Array = new Float32Array(data);
            const buffer = audioCtx.createBuffer(1, float32Array.length, 44100);
            buffer.copyToChannel(float32Array, 0);
            
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);
            source.start();
        });

        // --- FULLSCREEN TOGGLE LOGIC ---
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => console.log(e));
                try { screen.orientation.lock('landscape'); } catch(e) {}
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });

        // Automatically update the button text if the user exits fullscreen using ESC or Swipe
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fullscreenBtn.innerText = '[ EXIT FULLSCREEN ]';
            } else {
                fullscreenBtn.innerText = '[ ENTER FULLSCREEN ]';
            }
        });

        // --- THE AWAKENING SEQUENCE ---
        document.getElementById('start-btn').addEventListener('click', async () => {
            try { await document.documentElement.requestFullscreen(); } catch(e) { console.log(e); }
            try { await screen.orientation.lock('landscape'); } catch(e) { console.log(e); }
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
            document.getElementById('start-overlay').style.display = 'none';
            startSensors();
        });

        function startSensors() {
            const video = document.getElementById('hidden-video');
            const hiddenCanvas = document.getElementById('hidden-canvas');
            const hiddenCtx = hiddenCanvas.getContext('2d', { alpha: false });
            hiddenCanvas.width = 640; hiddenCanvas.height = 480;

            navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'user' }, 
                audio: true 
            })
            .then(stream => {
                video.srcObject = stream;
                
                video.play().catch(e => {
                    statusBar.innerHTML += '<br><span style="color: #ff0000">ERR: VIDEO_PLAY_BLOCKED</span>';
                });

                // --- PHASE 3A: OPTIC NERVE ---
                setInterval(() => {
                    if (video.readyState >= 2 && !video.paused) {
                        hiddenCtx.drawImage(video, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
                        socket.emit('video_frame', hiddenCanvas.toDataURL('image/jpeg', 0.6));
                    }
                }, 1000 / 15); 

                // --- PHASE 3B: AUDITORY NERVE ---
                const source = audioCtx.createMediaStreamSource(stream);
                const processor = audioCtx.createScriptProcessor(4096, 1, 1);
                
                const muteNode = audioCtx.createGain();
                muteNode.gain.value = 0;
                
                source.connect(processor);
                processor.connect(muteNode);            
                muteNode.connect(audioCtx.destination); 
                
                processor.onaudioprocess = (e) => {
                    const inputData = e.inputBuffer.getChannelData(0);
                    socket.emit('audio_chunk', inputData.buffer);
                };
            })
            .catch(err => {
                statusBar.innerHTML += `<br><span style="color: #ff0000">ERR: ${err.name} - ${err.message}</span>`;
            });
        }

        // --- FACE RENDERER ---
        function resizeCanvas() {
            const container = document.getElementById('canvas-container');
            const size = Math.min(container.clientWidth, container.clientHeight) * 0.9;
            canvas.width = size; canvas.height = size;
        }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        function scheduleNextBlink(energy) {
            nextBlinkTime = performance.now() + 2000 + Math.random() * 4000 + (energy * 1500);
        }

        function drawFace(timestamp) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#00ff41'; ctx.fillStyle = '#00ff41';
            
            const baseLineWidth = canvas.width * 0.015;
            ctx.lineWidth = baseLineWidth; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

            const cx = canvas.width / 2; const cy = canvas.height / 2;
            const faceScale = canvas.width / 400;

            if (!isBlinking && timestamp > nextBlinkTime) {
                isBlinking = true; blinkTimer = timestamp + 100 + ((1 - liveEnergy) * 150); 
            } else if (isBlinking && timestamp > blinkTimer) {
                isBlinking = false; scheduleNextBlink(liveEnergy);
            }

            // Eyes
            const eyeOffX = 60 * faceScale, eyeOffY = -30 * faceScale;
            let eyeRadY = Math.max(2 * faceScale, 25 * faceScale + (liveEnergy * 8 * faceScale));
            if (isBlinking) eyeRadY = 2 * faceScale; 

            ctx.lineWidth = baseLineWidth * 1.3;
            ctx.beginPath(); ctx.ellipse(cx - eyeOffX, cy + eyeOffY, 25 * faceScale, eyeRadY, 0, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(cx + eyeOffX, cy + eyeOffY, 25 * faceScale, eyeRadY, 0, 0, Math.PI * 2); ctx.stroke();

            // Eyelashes
            ctx.lineWidth = baseLineWidth * 0.6; 
            const lashLength = 12 * faceScale;
            const leftLashAngles = [Math.PI * 1.15, Math.PI * 1.3, Math.PI * 1.45]; 
            const rightLashAngles = [Math.PI * 1.85, Math.PI * 1.7, Math.PI * 1.55]; 

            function drawLashes(eyeCenterX, eyeCenterY, angles) {
                angles.forEach(angle => {
                    const startX = eyeCenterX + (25 * faceScale) * Math.cos(angle);
                    const startY = eyeCenterY + eyeRadY * Math.sin(angle);
                    const endX = startX + lashLength * Math.cos(angle);
                    const endY = startY + lashLength * Math.sin(angle);
                    ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(endX, endY); ctx.stroke();
                });
            }
            drawLashes(cx - eyeOffX, cy + eyeOffY, leftLashAngles);
            drawLashes(cx + eyeOffX, cy + eyeOffY, rightLashAngles);

            // Brows
            ctx.lineWidth = baseLineWidth; 
            const browTilt = liveEnergy * 15 * faceScale;
            ctx.beginPath(); ctx.moveTo(cx - eyeOffX - 25*faceScale, cy - 100*faceScale - browTilt); ctx.lineTo(cx - eyeOffX + 25*faceScale, cy - 100*faceScale + browTilt); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx + eyeOffX - 25*faceScale, cy - 100*faceScale + browTilt); ctx.lineTo(cx + eyeOffX + 25*faceScale, cy - 100*faceScale - browTilt); ctx.stroke();

            // Mouth
            const mOffY = 50 * faceScale;
            ctx.beginPath(); ctx.moveTo(cx - 25*faceScale, cy + mOffY);
            ctx.quadraticCurveTo(cx, cy + mOffY + (liveValence * 40 * faceScale), cx + 25*faceScale, cy + mOffY);
            if (liveTalk > 0.05) {
                ctx.quadraticCurveTo(cx, cy + mOffY + (liveValence * 40 * faceScale) + (liveTalk * 50 * faceScale), cx - 25*faceScale, cy + mOffY);
                ctx.fill(); 
            } else { ctx.stroke(); }
            
            requestAnimationFrame(drawFace);
        }
        scheduleNextBlink(0); requestAnimationFrame(drawFace);
    </script>
</body>
</html>
